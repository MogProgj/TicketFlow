name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build and test
        run: |
          if [ -f "./mvnw" ]; then
            chmod +x mvnw
            ./mvnw -B test
          else
            echo "No mvnw yet. Add a Spring Initializr project when ready."
          fi
